# ════════════════════════════════════════════════════════════════
#  NETLIFY CONFIG — Orchard Medical Management
#  Security headers, redirects, and build settings
# ════════════════════════════════════════════════════════════════

[build]
  publish = "."        # serve from project root (all .html files)

# ── Security headers applied to every page ───────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
      font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
      img-src 'self' data: https:;
      connect-src 'self' https://formspree.io https://generativelanguage.googleapis.com;
      frame-ancestors 'none';
    """

# ── Pretty URLs — /about → /about.html ───────────────────────
[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/services"
  to   = "/services.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/careers"
  to   = "/careers.html"
  status = 200

[[redirects]]
  from = "/ai-automation"
  to   = "/ai-automation.html"
  status = 200

[[redirects]]
  from = "/blog"
  to   = "/blog/index.html"
  status = 200

# ── 404 fallback ─────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
